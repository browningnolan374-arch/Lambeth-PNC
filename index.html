<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Lambeth PNC</title>
</head>
<body>
    <header>
        <h1>Lambeth Police National Computer</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#wanted">Wanted List</a></li>
                <li><a href="#reports">Reports</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="search">
            <h2>Search Criminal Records</h2>
            <form id="search-form">
                <input type="text" id="search-input" placeholder="Enter name or ID" required>
                <button type="submit">Search</button>
            </form>
            <div id="results-area">
                <h3>Results:</h3>
                <div id="results"></div>
            </div>
        </section>
    </main>
    <footer>

    </footer>
    <script src="script.js"></script>
</body>
</html>
