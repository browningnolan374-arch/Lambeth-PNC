<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lambeth PNC System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #1a1a1a;
            color: #00ff00;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #top-bar {
            background-color: #0a0e27;
            border-bottom: 3px solid #00ff00;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 255, 0, 0.2);
        }

        #top-bar h1 {
            color: #00ff00;
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #sidebar {
            width: 200px;
            background-color: #0f1419;
            border-right: 2px solid #00ff00;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #sidebar button {
            background: none;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 12px 15px;
            margin: 5px 10px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            transition: all 0.3s;
        }

        #sidebar button:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        #sidebar button.active {
            background-color: #00ff00;
            color: #000;
        }

        .panic-button {
            border-color: #ff0000 !important;
            color: #ff0000 !important;
            background-color: rgba(255, 0, 0, 0.1) !important;
            margin-top: auto;
        }

        #content-panel {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #1a1a1a;
        }

        section {
            display: none;
        }

        section.active {
            display: block;
        }

        section h2 {
            color: #00ff00;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input, .add-btn {
            padding: 12px;
            background-color: #0f1419;
            border: 2px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
        }

        .search-box button, .add-btn {
            background-color: #00ff00;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .panic-activate-btn {
            width: 100%;
            padding: 30px;
            background-color: #ff0000;
            color: #fff;
            border: none;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .results-area {
            background-color: #0f1419;
            border: 2px solid #00ff00;
            padding: 15px;
            min-height: 200px;
            max-height: 600px;
            overflow-y: auto;
        }

        .result-card {
            background-color: #1a1a1a;
            border: 1px solid #00ff00;
            padding: 15px;
            margin-bottom: 10px;
        }

        .result-card h3, .result-card p {
            color: #00ff00;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <h1>🚔 LAMBETH PNC SYSTEM</h1>
        <div>
            <span id="live-clock">--:--:--</span>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="sidebar">
            <button onclick="navigate('search-person')" class="active">👤 Search Person</button>
            <button onclick="navigate('vehicles')">🚗 Vehicles</button>
            <button onclick="navigate('reports')">📋 Reports</button>
            <button onclick="navigate('warrants')">⚠️ Warrants</button>
            <button onclick="navigate('anpr')">📹 ANPR</button>
            <button onclick="navigate('panic')" class="panic-button">🚨 PANIC</button>
        </div>

        <div id="content-panel">
            <section id="search-person" class="active">
                <h2>Person Search</h2>
                <div class="search-box">
                    <input type="text" id="person-search" placeholder="Enter name or ID...">
                    <button onclick="searchPerson()">Search</button>
                </div>
                <div id="person-results" class="results-area"><p>Enter a name or ID</p></div>
            </section>

            <section id="vehicles">
                <h2>Vehicle Search</h2>
                <div class="search-box">
                    <input type="text" id="vehicle-search" placeholder="Enter plate...">
                    <button onclick="searchVehicle()">Search</button>
                </div>
                <div id="vehicle-results" class="results-area"><p>Enter a plate</p></div>
            </section>

            <section id="reports">
                <h2>Incident Reports</h2>
                <button class="add-btn" onclick="createReport()">+ Create Report</button>
                <div id="reports-list" class="results-area"><p>No reports</p></div>
            </section>

            <section id="warrants">
                <h2>Warrants</h2>
                <div class="search-box">
                    <input type="text" id="warrant-search" placeholder="Search...">
                    <button onclick="searchWarrants()">Search</button>
                </div>
                <div id="warrants-list" class="results-area"><p>No warrants</p></div>
            </section>

            <section id="anpr">
                <h2>ANPR</h2>
                <div class="search-box">
                    <input type="text" id="anpr-search" placeholder="Enter plate...">
                    <button onclick="searchANPR()">Search</button>
                </div>
                <div id="anpr-results" class="results-area"><p>Enter a plate</p></div>
            </section>

            <section id="panic">
                <h2>⚠️ PANIC ALERT</h2>
                <button class="panic-activate-btn" onclick="activatePanic()">ACTIVATE PANIC</button>
                <input type="text" id="panic-reason" placeholder="Reason (optional)">
                <div id="panic-history" class="results-area"><p>No history</p></div>
            </section>
        </div>
    </div>

    <script>
        function updateClock() {
            document.getElementById('live-clock').textContent = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function navigate(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('#sidebar button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        const API = 'https://lambeth-pnc.onrender.com/api';

        function searchPerson() {
            const query = document.getElementById('person-search').value;
            fetch(`${API}/search/person?query=${query}`).then(r => r.json()).then(d => {
                document.getElementById('person-results').innerHTML = d.results ? d.results.map(p => `<div class="result-card"><h3>${p.name}</h3><p>DOB: ${p.dob}</p></div>`).join('') : '<p>No results</p>';
            }).catch(() => document.getElementById('person-results').innerHTML = '<p>Error</p>');
        }

        function searchVehicle() {
            const query = document.getElementById('vehicle-search').value;
            fetch(`${API}/search/vehicle?plate=${query}`).then(r => r.json()).then(d => {
                document.getElementById('vehicle-results').innerHTML = d.results ? d.results.map(v => `<div class="result-card"><h3>${v.plate}</h3><p>Owner: ${v.owner}</p></div>`).join('') : '<p>No results</p>';
            }).catch(() => document.getElementById('vehicle-results').innerHTML = '<p>Error</p>');
        }

        function searchWarrants() {
            const query = document.getElementById('warrant-search').value;
            fetch(`${API}/search/warrants?query=${query}`).then(r => r.json()).then(d => {
                document.getElementById('warrants-list').innerHTML = d.results ? d.results.map(w => `<div class="result-card"><h3>${w.name}</h3><p>Reason: ${w.reason}</p></div>`).join('') : '<p>No warrants</p>';
            }).catch(() => document.getElementById('warrants-list').innerHTML = '<p>No warrants</p>');
        }

        function searchANPR() {
            const query = document.getElementById('anpr-search').value;
            fetch(`${API}/search/anpr?plate=${query}`).then(r => r.json()).then(d => {
                document.getElementById('anpr-results').innerHTML = d.results ? d.results.map(a => `<div class="result-card"><h3>${a.plate}</h3><p>Location: ${a.location}</p></div>`).join('') : '<p>No records</p>';
            }).catch(() => document.getElementById('anpr-results').innerHTML = '<p>Error</p>');
        }

        function activatePanic() {
            const reason = document.getElementById('panic-reason').value || 'Officer Needs Help';
            fetch(`${API}/panic`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reason, timestamp: new Date() })
            }).then(() => alert('🚨 PANIC ACTIVATED')).catch(() => alert('Error'));
        }

        function createReport() {
            const name = prompt('Report name:');
            if (!name) return;
            fetch(`${API}/reports`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            }).then(() => loadReports());
        }

        function loadReports() {
            fetch(`${API}/reports`).then(r => r.json()).then(d => {
                document.getElementById('reports-list').innerHTML = d.reports ? d.reports.map(r => `<div class="result-card"><h3>${r.name}</h3></div>`).join('') : '<p>No reports</p>';
            });
        }

        loadReports();
    </script>
</body>
</html>
